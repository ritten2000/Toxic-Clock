<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einde schooljaar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2.4rem; padding: 2rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .title {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #f2f2f2;
    text-align: center;
  }

  /* ── Braun clock ── */
  .clock {
    width: 160px; height: 160px; border-radius: 50%;
    background: #181818; border: 3px solid #2a2a2a;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06),
                0 8px 40px rgba(0,0,0,0.85),
                inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  .ticks { position: absolute; inset: 0; }
  .tick {
    position: absolute; left: 50%; top: 4px;
    width: 1px; height: 8px; margin-left: -0.5px;
    background: rgba(255,255,255,0.2);
    transform-origin: 50% 76px;
  }
  .tick.major {
    width: 2px; height: 12px; margin-left: -1px;
    background: rgba(255,255,255,0.55);
  }
  .hand {
    position: absolute; bottom: 50%; left: 50%;
    transform-origin: 50% 100%; border-radius: 3px 3px 0 0;
  }
  .hand-hr  { width: 3px;  height: 46px; margin-left: -1.5px; background: #fff; }
  .hand-min { width: 2px;  height: 62px; margin-left: -1px;   background: #fff; }
  .hand-sec { width: 1.5px;height: 68px; margin-left: -0.75px;background: #e8542e; border-radius: 1px; }
  .hand-sec::after {
    content: ""; position: absolute; bottom: -16px; left: -1.25px;
    width: 4px; height: 16px; background: #e8542e; border-radius: 2px;
  }
  .center {
    position: absolute; top: 50%; left: 50%;
    width: 8px; height: 8px; margin: -4px 0 0 -4px;
    background: #fff; border-radius: 50%; z-index: 5;
    box-shadow: 0 0 0 2px #181818;
  }
  .center-dot {
    position: absolute; top: 50%; left: 50%;
    width: 4px; height: 4px; margin: -2px 0 0 -2px;
    background: #e8542e; border-radius: 50%; z-index: 6;
  }

  /* ── Split-flap countdown ── */
  .countdown { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .digits { display: flex; gap: 4px; }
  .flap {
    position: relative; width: 46px; height: 64px;
    font-family: "Courier New", monospace; font-weight: 700; font-size: 42px;
    color: #f2f2f2; line-height: 64px; text-align: center;
    background: linear-gradient(#262626, #1a1a1a);
    border-radius: 6px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 4px 14px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  .flap::before {
    content: ""; position: absolute; left: 0; right: 0; top: 50%;
    height: 1px; background: rgba(0,0,0,0.6); z-index: 3;
  }
  .flap.flip { animation: flip 0.28s ease-in; }
  @keyframes flip {
    0%   { transform: rotateX(0deg); }
    49%  { transform: rotateX(-90deg); }
    50%  { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }
  .label {
    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .done {
    font-size: 14px; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }

  /* ── Toxiciteit Meter ── */
  .meter-wrap { display: flex; flex-direction: column; gap: 12px; }
  .meter-title {
    font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); text-align: center;
  }
  .meter-track {
    position: relative; height: 26px; border-radius: 13px; overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08),
                inset 0 2px 6px rgba(0,0,0,0.6);
  }
  .meter-bar {
    position: absolute; inset: 0;
    background: linear-gradient(to right,
      #2fb84f 0%, #7ec23a 26%, #f2c200 52%, #f08c1e 74%, #e8542e 100%);
  }
  /* dark cover that eats the bar from the right → left */
  .meter-cover {
    position: absolute; top: 0; right: 0; bottom: 0;
    background: #000;
    box-shadow: -1px 0 0 rgba(255,255,255,0.85);
    transition: width 0.4s linear;
  }
  .meter-scale {
    display: flex; justify-content: space-between;
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .meter-pct { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

  <h1 class="title">Einde schooljaar</h1>

  <div class="clock">
    <div class="ticks" id="ticks"></div>
    <div class="hand hand-hr"  id="hr"></div>
    <div class="hand hand-min" id="min"></div>
    <div class="hand hand-sec" id="sec"></div>
    <div class="center"></div>
    <div class="center-dot"></div>
  </div>

  <div class="countdown" id="countdown">
    <div class="unit"><div class="digits" id="days"></div><span class="label">dagen</span></div>
    <div class="unit"><div class="digits" id="hours"></div><span class="label">uren</span></div>
    <div class="unit"><div class="digits" id="mins"></div><span class="label">min</span></div>
    <div class="unit"><div class="digits" id="secs"></div><span class="label">sec</span></div>
  </div>

  <div class="meter-wrap" id="meterWrap">
    <div class="meter-title">Toxiciteit Meter</div>
    <div class="meter-track">
      <div class="meter-bar"></div>
      <div class="meter-cover" id="meterCover"></div>
    </div>
    <div class="meter-scale">
      <span>Vakantie</span>
      <span class="meter-pct" id="meterPct">100%</span>
      <span>Schooljaar</span>
    </div>
  </div>

<script>
  // Meter is VOL (100% toxisch) op het startmoment hieronder en loopt
  // leeg naar 0% naarmate de aftelklok de einddatum nadert.
  var START = new Date("2026-06-03T00:00:00");  // vanaf hier: vol & zeer toxisch
  var END   = new Date("2026-06-30T23:59:59");
  var TOTAL = END - START;

  // Clock ticks
  var ticks = document.getElementById("ticks");
  for (var i = 0; i < 60; i++) {
    var t = document.createElement("div");
    t.className = "tick" + (i % 5 === 0 ? " major" : "");
    t.style.transform = "rotate(" + (i * 6) + "deg)";
    ticks.appendChild(t);
  }

  // Flap digits
  var prev = {};
  function buildUnit(id) {
    var c = document.getElementById(id);
    for (var j = 0; j < 2; j++) {
      var f = document.createElement("div");
      f.className = "flap"; f.textContent = "0";
      c.appendChild(f);
    }
    prev[id] = "00";
  }
  ["days","hours","mins","secs"].forEach(buildUnit);

  function setUnit(id, value) {
    var str = String(value).padStart(2, "0");
    if (str === prev[id]) return;
    var flaps = document.getElementById(id).children;
    for (var k = 0; k < 2; k++) {
      if (str[k] !== prev[id][k]) {
        flaps[k].textContent = str[k];
        flaps[k].classList.remove("flip");
        void flaps[k].offsetWidth;
        flaps[k].classList.add("flip");
      }
    }
    prev[id] = str;
  }

  // Keep the meter exactly as wide as the countdown
  function syncWidth() {
    var w = document.getElementById("countdown").offsetWidth;
    document.getElementById("meterWrap").style.width = w + "px";
  }
  window.addEventListener("resize", syncWidth);
  syncWidth();

  function tick() {
    var now = new Date();

    // Clock hands
    var s = now.getSeconds() + now.getMilliseconds() / 1000;
    var m = now.getMinutes() + s / 60;
    var h = (now.getHours() % 12) + m / 60;
    document.getElementById("hr").style.transform  = "rotate(" + (h * 30) + "deg)";
    document.getElementById("min").style.transform = "rotate(" + (m * 6) + "deg)";
    document.getElementById("sec").style.transform = "rotate(" + (s * 6) + "deg)";

    var diff = Math.max(0, END - now);

    // Countdown digits
    if (diff <= 0) {
      document.getElementById("countdown").innerHTML =
        '<p class="done">🌊 Het is zomervakantie!</p>';
    } else {
      setUnit("days",  Math.floor(diff / 86400000));
      setUnit("hours", Math.floor((diff % 86400000) / 3600000));
      setUnit("mins",  Math.floor((diff % 3600000) / 60000));
      setUnit("secs",  Math.floor((diff % 60000) / 1000));
    }

    // Toxiciteit meter: toxicity = fraction of the school year still remaining
    var toxicity = Math.min(1, Math.max(0, diff / TOTAL));   // 1 = vol/rood, 0 = enkel groen
    var coverPct = (1 - toxicity) * 100;                     // dark cover grows from the right
    document.getElementById("meterCover").style.width = coverPct.toFixed(2) + "%";
    document.getElementById("meterPct").textContent = Math.round(toxicity * 100) + "%";
  }

  tick();
  setInterval(tick, 1000 / 30);
</script>
</body>
</html>
